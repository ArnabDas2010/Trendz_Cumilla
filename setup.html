<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Setup — TRENDZ COMILLA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <header>
        <div class="header-main">
            <a href="index.html" class="logo">TRENDZ <span>COMILLA</span></a>
        </div>
    </header>

    <main class="container" style="padding-top:24px;">
        <div style="max-width:480px; margin:0 auto;">
            <div class="text-center" style="margin-bottom:28px;">
                <div style="width:60px;height:60px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px;color:var(--accent);">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>
                <h2 style="font-family:var(--font-serif);font-size:24px;font-weight:900;margin-bottom:4px;">Project Setup</h2>
                <p style="color:var(--text-muted);font-size:13px;">Initialize Firestore with fashion demo data</p>
            </div>

            <div class="form-card" style="margin-bottom:12px;">
                <h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;color:var(--primary);">1. Seed Demo Products</h4>
                <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Adds fashion sample products to Firestore.</p>
                <button class="btn btn-accent" onclick="seedProducts()" id="seedBtn">
                    <i class="fa-solid fa-database"></i> SEED FASHION PRODUCTS
                </button>
                <div id="seedMsg" style="display:none;margin-top:12px;padding:10px 14px;border-radius:var(--radius-md);font-size:13px;"></div>
            </div>

            <div class="form-card" style="margin-bottom:12px;">
                <h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;color:var(--primary);">2. Promote User Role</h4>
                <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Register an account first, then paste the UID here.</p>
                <div class="form-group">
                    <label>User UID</label>
                    <input type="text" id="targetUid" placeholder="Paste Firebase UID...">
                </div>
                <div class="form-group">
                    <label>Set Role</label>
                    <select id="targetRole">
                        <option value="owner">Owner</option>
                        <option value="admin">Admin</option>
                        <option value="user">User</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="setRole()">
                    <i class="fa-solid fa-user-shield"></i> UPDATE ROLE
                </button>
                <div id="roleMsg" style="display:none;margin-top:12px;padding:10px 14px;border-radius:var(--radius-md);font-size:13px;"></div>
            </div>

            <div class="text-center" style="margin-top:20px;">
                <a href="index.html" style="font-size:13px;color:var(--accent);font-weight:600;text-decoration:none;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Store
                </a>
            </div>
        </div>
        <div class="spacer-40"></div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script>
        const fashionProducts = [
            { title: "Men's Premium Cotton Panjabi", price: 1200, discount: 10, image: "https://images.unsplash.com/photo-1580657018950-c7f7d6a6d990?w=600&q=75", category: "Men", stock: 80, description: "Premium quality cotton panjabi for Eid & special occasions.\n\nSize: S, M, L, XL, XXL\nFabric: 100% Cotton\nWash: Hand wash recommended" },
            { title: "Women's Embroidered Saree", price: 3500, discount: 15, image: "https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=600&q=75", category: "Women", stock: 40, description: "Elegant embroidered silk blend saree.\n\nLength: 6 meters\nBlouse piece included\nDry clean only" },
            { title: "Casual Denim Jacket — Men", price: 2200, discount: 20, image: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600&q=75", category: "Men", stock: 55, description: "Classic denim jacket for everyday wear.\n\nSize: S to XXL\nMaterial: 98% Cotton, 2% Elastane" },
            { title: "Girls Floral Frock", price: 750, discount: 0, image: "https://images.unsplash.com/photo-1518831959646-742c3a14ebf7?w=600&q=75", category: "Kids", stock: 60, description: "Bright floral frock for girls age 3–10.\n\nSoft breathable fabric, perfect for summer." },
            { title: "Traditional Jamdani Sharee", price: 5500, discount: 5, image: "https://images.unsplash.com/photo-1649072131048-9f78ddc73e2c?w=600&q=75", category: "Traditional", stock: 20, description: "Authentic Jamdani sharee from Dhaka.\n\nHandwoven by artisans. One of a kind pattern.\nHandwash in cold water." },
            { title: "Gold-Tone Bangles Set (6 Pcs)", price: 480, discount: 0, image: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=600&q=75", category: "Accessories", stock: 120, description: "Stylish gold-tone bangles set of 6 pieces.\nAlloy material, lead-free.\nFits most wrist sizes." },
            { title: "Men's Leather Loafers", price: 1800, discount: 12, image: "https://images.unsplash.com/photo-1614252235316-8c857d38b5f4?w=600&q=75", category: "Footwear", stock: 45, description: "Premium synthetic leather loafers.\n\nSizes: 40–45 EU\nSlip-on design, cushioned insole." },
            { title: "Women's Printed Kurti", price: 650, discount: 8, image: "https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=600&q=75", category: "Women", stock: 90, description: "Lightweight printed kurti for daily wear.\n\nSizes: XS to 3XL\n100% Cotton, machine washable." }
        ];

        function seedProducts() {
            const btn = document.getElementById('seedBtn');
            const msg = document.getElementById('seedMsg');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> SEEDING...';
            btn.disabled = true;

            let done = 0;
            fashionProducts.forEach(p => {
                p.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
                db.collection('products').add(p).then(() => {
                    done++;
                    if (done === fashionProducts.length) {
                        btn.innerHTML = '<i class="fa-solid fa-check"></i> DONE!';
                        msg.style.display = 'block';
                        msg.style.background = '#edfaf0';
                        msg.style.color = '#1a6b35';
                        msg.style.border = '1px solid #a3dfb4';
                        msg.textContent = '✓ ' + done + ' fashion products added successfully!';
                    }
                });
            });
        }

        function setRole() {
            const uid = document.getElementById('targetUid').value.trim();
            const role = document.getElementById('targetRole').value;
            const msg = document.getElementById('roleMsg');
            if (!uid) { alert('Please enter a UID.'); return; }

            db.collection('users').doc(uid).update({ role })
                .then(() => {
                    msg.style.display = 'block';
                    msg.style.background = '#edfaf0';
                    msg.style.color = '#1a6b35';
                    msg.style.border = '1px solid #a3dfb4';
                    msg.textContent = '✓ User promoted to ' + role + ' successfully!';
                })
                .catch(err => {
                    msg.style.display = 'block';
                    msg.style.background = '#fff5f5';
                    msg.style.color = '#c0392b';
                    msg.style.border = '1px solid #ffd7d7';
                    msg.textContent = '✗ Error: ' + err.message + ' (User must register first)';
                });
        }
    </script>
</body>
</html>
