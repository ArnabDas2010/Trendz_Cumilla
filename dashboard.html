<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Account — TRENDZ COMILLA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <header>
        <div class="header-main">
            <a href="index.html" class="action-btn" style="font-size:16px;width:auto;padding:0 8px 0 0;text-decoration:none;color:var(--text-main);">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <a href="index.html" class="logo">TRENDZ <span>COMILLA</span></a>
            <div class="header-actions" style="margin-left:auto;">
                <a href="settings.html" class="action-btn"><i class="fa-solid fa-gear"></i></a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top:20px;">

        <!-- Profile Hero -->
        <div class="profile-hero">
            <div class="profile-avatar" id="profileAvatarWrap">
                <i class="fa-solid fa-user"></i>
            </div>
            <div style="position:relative;z-index:1;min-width:0;">
                <div id="userNameDisplay" style="font-family:var(--font-serif);font-size:19px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Fashion Lover</div>
                <div id="userEmailDisplay" style="font-size:12px;opacity:0.7;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
                <div id="userProviderBadge" style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;background:rgba(200,169,110,0.15);border:1px solid rgba(200,169,110,0.3);padding:3px 8px;border-radius:50px;font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.5px;"></div>
            </div>
        </div>

        <!-- Orders -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
            <h3 style="font-family:var(--font-serif);font-size:19px;font-weight:700;">My Orders</h3>
        </div>

        <div id="orderList">
            <div class="text-center" style="padding:60px 0;">
                <div class="loading-spinner" style="margin:0 auto;"></div>
            </div>
        </div>
        <div class="spacer-40"></div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'login.html'; return; }

            document.getElementById('userEmailDisplay').textContent = user.email;

            db.collection('users').doc(user.uid).get().then(doc => {
                if (!doc.exists) return;
                const u = doc.data();

                // Name
                document.getElementById('userNameDisplay').textContent = u.name || user.displayName || 'Fashion Lover';

                // Profile photo — Google photo or fallback icon
                const avatarWrap = document.getElementById('profileAvatarWrap');
                const photo = u.photoURL || user.photoURL;
                if (photo) {
                    avatarWrap.innerHTML = `<img src="${photo}" alt="Profile" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
                }

                // Provider badge
                const badge = document.getElementById('userProviderBadge');
                if (u.provider === 'google') {
                    badge.innerHTML = '<svg width="10" height="10" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Google Account';
                } else {
                    badge.innerHTML = '<i class="fa-solid fa-envelope"></i> Email Account';
                }
            });

            // Load orders
            db.collection('orders').where('userId','==',user.uid).orderBy('createdAt','desc').get().then(snap => {
                const list = document.getElementById('orderList');
                if (snap.empty) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-bag-shopping" style="font-size:48px;color:var(--border-dark);margin-bottom:16px;"></i>
                            <p style="font-family:var(--font-serif);font-size:17px;font-weight:600;margin-bottom:6px;">No orders yet</p>
                            <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;">Start shopping your favourite styles</p>
                            <a href="index.html" class="btn btn-accent" style="width:auto;padding:11px 24px;">EXPLORE COLLECTION</a>
                        </div>`;
                    return;
                }
                let html = '';
                snap.forEach(doc => {
                    const o    = doc.data();
                    const date = o.createdAt ? o.createdAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
                    let cls = 'status-pending';
                    if (o.status === 'Confirmed' || o.status === 'Shipped') cls = 'status-confirmed';
                    if (o.status === 'Delivered') cls = 'status-delivered';
                    html += `
                        <div class="order-card">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                                <div>
                                    <div style="font-weight:700;font-size:13px;">#${doc.id.substring(0,8).toUpperCase()}</div>
                                    <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${date}</div>
                                </div>
                                <span class="status-badge ${cls}">${o.status}</span>
                            </div>
                            <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px;">
                                ${o.items.map(i=>`
                                    <div style="display:flex;justify-content:space-between;font-size:13px;">
                                        <span><span style="color:var(--accent);font-weight:700;">${i.quantity}×</span> ${i.title}</span>
                                        <span style="font-weight:600;">৳${i.price*i.quantity}</span>
                                    </div>`).join('')}
                            </div>
                            <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:1px dashed var(--border);">
                                <span style="font-size:11px;color:var(--text-muted);">${o.paymentMethod.toUpperCase()}</span>
                                <span style="font-weight:800;color:var(--primary);">৳${o.total}</span>
                            </div>
                        </div>`;
                });
                list.innerHTML = html;
            });
        });
    </script>
</body>
</html>
