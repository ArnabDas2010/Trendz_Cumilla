<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Account — TRENDZ COMILLA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <header>
        <div class="header-main">
            <a href="index.html" class="action-btn" style="font-size:16px;width:auto;padding:0 8px 0 0;text-decoration:none;color:var(--text-main);">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <a href="index.html" class="logo">TRENDZ <span>COMILLA</span></a>
            <div class="header-actions" style="margin-left:auto;">
                <a href="settings.html" class="action-btn"><i class="fa-solid fa-gear"></i></a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top:20px;">
        <div class="profile-hero">
            <div class="profile-avatar"><i class="fa-solid fa-user"></i></div>
            <div style="position:relative;z-index:1;">
                <div id="userNameDisplay" style="font-family:var(--font-serif);font-size:19px;font-weight:700;">Fashion Lover</div>
                <div id="userEmailDisplay" style="font-size:12px;opacity:0.75;margin-top:2px;"></div>
            </div>
        </div>

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <h3 style="font-family:var(--font-serif);font-size:19px;font-weight:700;">My Orders</h3>
        </div>

        <div id="orderList">
            <div class="text-center" style="padding:60px 0;">
                <div class="loading-spinner" style="margin:0 auto;"></div>
            </div>
        </div>
        <div class="spacer-40"></div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('userEmailDisplay').textContent = user.email;
            db.collection('users').doc(user.uid).get().then(doc => {
                if (doc.exists) document.getElementById('userNameDisplay').textContent = doc.data().name || 'Fashion Lover';
            });

            db.collection('orders').where('userId','==',user.uid).orderBy('createdAt','desc').get().then(snap => {
                const list = document.getElementById('orderList');
                if (snap.empty) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-bag-shopping" style="font-size:48px;color:var(--border-dark);margin-bottom:16px;"></i>
                            <p style="font-family:var(--font-serif);font-size:17px;font-weight:600;margin-bottom:6px;">No orders yet</p>
                            <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;">Start shopping your favourite styles</p>
                            <a href="index.html" class="btn btn-accent" style="width:auto;padding:11px 24px;">EXPLORE COLLECTION</a>
                        </div>`;
                    return;
                }

                let html = '';
                snap.forEach(doc => {
                    const o = doc.data();
                    const date = o.createdAt ? o.createdAt.toDate().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) : '—';
                    let cls = 'status-pending';
                    if (o.status === 'Confirmed' || o.status === 'Shipped') cls = 'status-confirmed';
                    if (o.status === 'Delivered') cls = 'status-delivered';

                    html += `
                        <div class="order-card">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                                <div>
                                    <div style="font-weight:700;font-size:13px;color:var(--primary);">#${doc.id.substring(0,8).toUpperCase()}</div>
                                    <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${date}</div>
                                </div>
                                <span class="status-badge ${cls}">${o.status}</span>
                            </div>
                            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;">
                                ${o.items.map(i=>`
                                    <div style="display:flex;justify-content:space-between;font-size:13px;">
                                        <span><span style="color:var(--accent);font-weight:700;">${i.quantity}×</span> ${i.title}</span>
                                        <span style="font-weight:600;">৳${i.price*i.quantity}</span>
                                    </div>`).join('')}
                            </div>
                            <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:1px dashed var(--border);">
                                <span style="font-size:11px;color:var(--text-muted);">${o.paymentMethod.toUpperCase()}</span>
                                <span style="font-weight:800;color:var(--primary);">৳${o.total}</span>
                            </div>
                        </div>`;
                });
                list.innerHTML = html;
            });
        });
    </script>
</body>
</html>
