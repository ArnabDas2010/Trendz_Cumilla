<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In — TRENDZ COMILLA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        .tab-bar {
            display: flex;
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: calc(var(--radius-md) - 2px);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .tab-btn.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;">
    <header>
        <div class="header-main">
            <a href="index.html" class="action-btn" style="font-size:16px;width:auto;padding:0 8px 0 0;text-decoration:none;color:var(--text-main);">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <a href="index.html" class="logo">TRENDZ <span>COMILLA</span></a>
        </div>
    </header>

    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;">
        <div style="width:100%;max-width:380px;">

            <!-- Brand -->
            <div class="text-center" style="margin-bottom:24px;">
                <div style="width:56px;height:56px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:20px;color:var(--accent);">
                    <i class="fa-solid fa-shirt"></i>
                </div>
                <h2 style="font-family:var(--font-serif);font-size:24px;font-weight:900;margin-bottom:2px;">TRENDZ COMILLA</h2>
                <p style="color:var(--text-muted);font-size:12px;">Premium Fashion — Comilla</p>
            </div>

            <!-- Page loader (shown during sign-in / role fetch) -->
            <div id="pageLoader" style="display:none;text-align:center;padding:40px 0;">
                <div class="loading-spinner" style="margin:0 auto 14px;"></div>
                <p style="font-size:13px;color:var(--text-muted);">Please wait...</p>
            </div>

            <div id="mainCard" class="form-card">

                <!-- Google Button -->
                <button class="btn btn-google" onclick="handleGoogle()" id="googleBtn">
                    <svg class="g-icon" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="or-divider">OR</div>

                <!-- Tab Bar -->
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab('login')" id="tabLogin">SIGN IN</button>
                    <button class="tab-btn" onclick="switchTab('register')" id="tabRegister">CREATE ACCOUNT</button>
                </div>

                <!-- Error box (shared) -->
                <div id="authError" style="display:none;background:#fff5f5;border:1px solid #ffd7d7;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#c0392b;"></div>

                <!-- LOGIN PANEL -->
                <div class="tab-panel active" id="panelLogin">
                    <form id="loginForm">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="loginEmail" required placeholder="name@example.com" autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
                        </div>
                        <button type="submit" id="loginBtn" class="btn btn-primary">
                            SIGN IN <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>
                    <p class="text-center" style="margin-top:14px;font-size:12px;color:var(--text-muted);">
                        No account? <a href="javascript:switchTab('register')" style="color:var(--accent);font-weight:700;text-decoration:none;">Create one free</a>
                    </p>
                </div>

                <!-- REGISTER PANEL -->
                <div class="tab-panel" id="panelRegister">
                    <form id="registerForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="regName" required placeholder="Your full name" autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="regEmail" required placeholder="name@example.com" autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="regPassword" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
                        </div>
                        <button type="submit" id="regBtn" class="btn btn-accent">
                            CREATE ACCOUNT <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>
                    <p class="text-center" style="margin-top:14px;font-size:12px;color:var(--text-muted);">
                        Already joined? <a href="javascript:switchTab('login')" style="color:var(--accent);font-weight:700;text-decoration:none;">Sign in</a>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // ── Tab switching ─────────────────────────
        function switchTab(tab) {
            document.getElementById('authError').style.display = 'none';
            ['login','register'].forEach(function(t) {
                document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
                document.getElementById('tab'   + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
            });
        }

        function showErr(msg) {
            var el = document.getElementById('authError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function navigateByRole(role) {
            if (role === 'owner')      window.location.replace('owner.html');
            else if (role === 'admin') window.location.replace('admin.html');
            else                       window.location.replace('index.html');
        }

        function showPageLoader(msg) {
            document.getElementById('mainCard').style.display = 'none';
            var loader = document.getElementById('pageLoader');
            loader.querySelector('p').textContent = msg || 'Please wait...';
            loader.style.display = 'block';
        }

        // ── If already logged in, redirect immediately ────
        auth.onAuthStateChanged(function(u) {
            if (!u) return;
            // Already authenticated — show loader and go home
            showPageLoader('Signing you in...');
            getUserRole(u.uid).then(navigateByRole);
        });

        // ── Google Popup Sign-In ───────────────────────────
        function handleGoogle() {
            var btn = document.getElementById('googleBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in...';
            btn.disabled = true;
            document.getElementById('authError').style.display = 'none';

            signInWithGoogle(
                function(role) {
                    // Popup done, Firestore saved — navigate directly with known role
                    showPageLoader('Signing you in...');
                    navigateByRole(role);
                },
                function(err) {
                    btn.innerHTML = '<svg class="g-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google';
                    btn.disabled = false;
                    if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                        showErr(err.message || 'Google sign-in failed. Please try again.');
                    }
                }
            );
        }

        // ── Email/Password Sign In ─────────────────
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.getElementById('loginBtn');
            document.getElementById('authError').style.display = 'none';
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            btn.disabled = true;

            auth.signInWithEmailAndPassword(
                document.getElementById('loginEmail').value,
                document.getElementById('loginPassword').value
            ).then(function(cred) {
                showPageLoader('Signing you in...');
                return getUserRole(cred.user.uid);
            }).then(function(role) {
                navigateByRole(role);
            }).catch(function(err) {
                showErr(err.message);
                btn.innerHTML = 'SIGN IN <i class="fa-solid fa-arrow-right"></i>';
                btn.disabled = false;
            });
        });

        // ── Email/Password Register ────────────────
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn  = document.getElementById('regBtn');
            var name = document.getElementById('regName').value.trim();
            document.getElementById('authError').style.display = 'none';
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            btn.disabled = true;

            auth.createUserWithEmailAndPassword(
                document.getElementById('regEmail').value,
                document.getElementById('regPassword').value
            ).then(function(cred) {
                return db.collection('users').doc(cred.user.uid).set({
                    name:      name,
                    email:     cred.user.email,
                    photoURL:  '',
                    role:      'user',
                    status:    'active',
                    provider:  'email',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }).then(function() {
                showPageLoader('Setting up your account...');
                window.location.replace('index.html');
            }).catch(function(err) {
                showErr(err.message);
                btn.innerHTML = 'CREATE ACCOUNT <i class="fa-solid fa-arrow-right"></i>';
                btn.disabled = false;
            });
        });

        // Open register tab if URL has ?tab=register
        if (new URLSearchParams(window.location.search).get('tab') === 'register') {
            switchTab('register');
        }
    </script>
</body>
</html>
