<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings — TRENDZ COMILLA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <header>
        <div class="header-main">
            <a href="dashboard.html" class="action-btn" style="font-size:16px;width:auto;padding:0 8px 0 0;text-decoration:none;color:var(--text-main);">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <span style="font-family:var(--font-serif);font-size:18px;font-weight:700;">Settings</span>
        </div>
    </header>

    <main class="container" style="padding-top:20px;">
        <div class="form-card" style="margin-bottom:12px;">
            <h3 style="font-size:14px;font-weight:700;margin-bottom:18px;color:var(--primary);text-transform:uppercase;letter-spacing:0.8px;">Profile</h3>
            <form id="settingsForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="displayEmail" disabled style="background:var(--surface);color:var(--text-muted);">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="displayName" required placeholder="Your name">
                </div>
                <button type="submit" class="btn btn-primary">SAVE CHANGES</button>
            </form>
        </div>

        <div class="form-card" style="margin-bottom:12px;">
            <h3 style="font-size:14px;font-weight:700;margin-bottom:16px;color:var(--primary);text-transform:uppercase;letter-spacing:0.8px;">Appearance</h3>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <div style="font-weight:600;font-size:14px;">Dark Mode</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Toggle dark/light theme</div>
                </div>
                <button class="btn btn-secondary" style="width:auto;padding:10px 18px;font-size:12px;" onclick="toggleDarkMode()">
                    <i class="fa-solid fa-circle-half-stroke"></i> TOGGLE
                </button>
            </div>
        </div>

        <div class="form-card">
            <button class="btn btn-outline" style="color:#c0392b;border-color:#e8b4b4;" onclick="logout()">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> LOGOUT
            </button>
        </div>
        <div class="spacer-40"></div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('displayEmail').value = user.email;
            db.collection('users').doc(user.uid).get().then(doc => {
                if (doc.exists) document.getElementById('displayName').value = doc.data().name || '';
            });
        });

        document.getElementById('settingsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            btn.disabled = true;
            db.collection('users').doc(currentUser.uid).update({ name: document.getElementById('displayName').value })
                .then(() => { btn.innerHTML = '<i class="fa-solid fa-check"></i> SAVED'; setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2000); });
        });

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
    </script>
</body>
</html>
