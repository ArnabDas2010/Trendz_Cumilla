<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings — TRENDZ COMILLA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <header>
        <div class="header-main">
            <a href="dashboard.html" class="action-btn" style="font-size:16px;width:auto;padding:0 8px 0 0;text-decoration:none;color:var(--text-main);">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <span style="font-family:var(--font-serif);font-size:18px;font-weight:700;">Settings</span>
        </div>
    </header>

    <main class="container" style="padding-top:20px;">

        <!-- Profile picture display -->
        <div style="text-align:center;margin-bottom:24px;">
            <div id="settingsAvatar" style="width:80px;height:80px;border-radius:50%;background:var(--primary);border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:32px;color:var(--accent);overflow:hidden;">
                <i class="fa-solid fa-user"></i>
            </div>
            <div id="settingsName" style="font-family:var(--font-serif);font-size:17px;font-weight:700;"></div>
            <div id="settingsProvider" style="font-size:11px;color:var(--text-muted);margin-top:3px;"></div>
        </div>

        <!-- Profile Edit -->
        <div class="form-card" style="margin-bottom:12px;">
            <h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:16px;color:var(--text-muted);">Profile</h3>
            <div class="form-group">
                <label>Email</label>
                <input type="text" id="displayEmail" disabled style="background:var(--surface);color:var(--text-muted);">
            </div>
            <div class="form-group" id="nameGroup">
                <label>Full Name</label>
                <input type="text" id="displayName" placeholder="Your name">
            </div>
            <!-- Google users: name is read-only -->
            <div id="googleNote" style="display:none;background:var(--surface);padding:10px 12px;border-radius:var(--radius-md);font-size:12px;color:var(--text-muted);margin-bottom:14px;">
                <i class="fa-brands fa-google" style="color:#4285F4;"></i> Name and photo are managed by your Google account.
            </div>
            <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">SAVE CHANGES</button>
        </div>

        <!-- Appearance -->
        <div class="form-card" style="margin-bottom:12px;">
            <h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:16px;color:var(--text-muted);">Appearance</h3>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <div style="font-weight:600;font-size:14px;">Dark Mode</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Toggle dark/light theme</div>
                </div>
                <button class="btn btn-secondary" style="width:auto;padding:10px 18px;font-size:12px;" onclick="toggleDarkMode()">
                    <i class="fa-solid fa-circle-half-stroke"></i> TOGGLE
                </button>
            </div>
        </div>

        <!-- Logout -->
        <div class="form-card">
            <button class="btn" style="background:#fff5f5;color:#c0392b;border:1px solid #ffd7d7;" onclick="logout()">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> LOGOUT
            </button>
        </div>

        <div class="spacer-40"></div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let isGoogleUser = false;

        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('displayEmail').value = user.email;

            db.collection('users').doc(user.uid).get().then(doc => {
                if (!doc.exists) return;
                const u = doc.data();
                const name  = u.name || user.displayName || '';
                const photo = u.photoURL || user.photoURL || '';

                document.getElementById('settingsName').textContent = name;
                document.getElementById('displayName').value = name;

                // Avatar
                const av = document.getElementById('settingsAvatar');
                if (photo) {
                    av.innerHTML = `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;">`;
                }

                // Google user handling
                if (u.provider === 'google') {
                    isGoogleUser = true;
                    document.getElementById('googleNote').style.display = 'block';
                    document.getElementById('displayName').disabled = true;
                    document.getElementById('displayName').style.background = 'var(--surface)';
                    document.getElementById('displayName').style.color = 'var(--text-muted)';
                    document.getElementById('saveBtn').style.display = 'none';
                    document.getElementById('settingsProvider').innerHTML =
                        '<i class="fa-brands fa-google" style="color:#4285F4;"></i> Signed in with Google';
                } else {
                    document.getElementById('settingsProvider').innerHTML =
                        '<i class="fa-solid fa-envelope" style="color:var(--accent);"></i> Email & Password';
                }
            });
        });

        function saveProfile() {
            if (isGoogleUser) return;
            const btn  = document.getElementById('saveBtn');
            const name = document.getElementById('displayName').value.trim();
            if (!name) return;
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            btn.disabled = true;

            db.collection('users').doc(currentUser.uid).update({ name })
                .then(() => {
                    document.getElementById('settingsName').textContent = name;
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> SAVED';
                    setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2000);
                });
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
    </script>
</body>
</html>
