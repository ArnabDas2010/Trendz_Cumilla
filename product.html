<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product — TRENDZ COMILLA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <header>
        <div class="header-main">
            <a href="index.html" class="action-btn" style="font-size:16px; width:auto; padding:0 10px 0 0; gap:6px; text-decoration:none; color:var(--text-main);">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <a href="index.html" class="logo">TRENDZ <span>COMILLA</span></a>
            <div class="header-actions" style="margin-left:auto;">
                <a href="cart.html" class="action-btn">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count" style="display:none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <main id="productDetail">
        <div class="text-center" style="padding:100px 0;">
            <div class="loading-spinner" style="margin:0 auto;"></div>
        </div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const pid = new URLSearchParams(window.location.search).get('id');
        if (!pid) window.location.href = 'index.html';

        db.collection('products').doc(pid).get().then(doc => {
            if (!doc.exists) {
                document.getElementById('productDetail').innerHTML = '<div class="container mt-20 text-center"><p>Product not found.</p></div>';
                return;
            }
            const p = doc.data();
            const dp = p.price - (p.price * (p.discount / 100));
            document.title = p.title + ' — TRENDZ COMILLA';

            document.getElementById('productDetail').innerHTML = `
                <div style="background:var(--white);">
                    <div style="width:100%; aspect-ratio:1/1; background:var(--surface); overflow:hidden; position:relative;">
                        <img src="${p.image}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;">
                        ${p.discount > 0 ? `<span style="position:absolute;top:14px;left:14px;background:var(--accent);color:var(--primary);font-size:10px;font-weight:800;padding:4px 10px;border-radius:50px;">${p.discount}% OFF</span>` : ''}
                    </div>
                    <div class="container" style="padding:20px 16px 100px;">
                        <div class="product-cat-tag" style="margin-bottom:6px;">${p.category || 'Fashion'}</div>
                        <h1 style="font-family:var(--font-serif);font-size:22px;font-weight:700;line-height:1.3;color:var(--primary);margin-bottom:12px;">${p.title}</h1>
                        <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:20px;">
                            <span style="font-size:30px;font-weight:800;color:var(--primary);">৳${dp.toFixed(0)}</span>
                            ${p.discount > 0 ? `<span style="text-decoration:line-through;color:var(--text-light);font-size:16px;">৳${p.price}</span><span style="font-size:12px;font-weight:700;color:var(--accent);">Save ৳${(p.price-dp).toFixed(0)}</span>` : ''}
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
                            <div style="background:var(--surface);padding:14px;border-radius:var(--radius-md);border:1px solid var(--border);">
                                <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:4px;">Category</div>
                                <div style="font-weight:600;font-size:13px;">${p.category}</div>
                            </div>
                            <div style="background:var(--surface);padding:14px;border-radius:var(--radius-md);border:1px solid var(--border);">
                                <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:4px;">Stock</div>
                                <div style="font-weight:600;font-size:13px;color:${p.stock>0?'#1a6b35':'#c0392b'};">
                                    <i class="fa-solid ${p.stock>0?'fa-check':'fa-times'}-circle"></i>
                                    ${p.stock>0?'In Stock ('+p.stock+')':'Out of Stock'}
                                </div>
                            </div>
                        </div>
                        ${p.description ? `
                        <div style="background:var(--surface);padding:16px;border-radius:var(--radius-md);border:1px solid var(--border);">
                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:8px;">Product Details</div>
                            <p style="font-size:14px;color:var(--text-main);line-height:1.7;white-space:pre-line;">${p.description}</p>
                        </div>` : ''}
                    </div>
                </div>
                <div class="mobile-action-bar">
                    <button class="btn btn-secondary" style="flex:1;" onclick="addToCart('${doc.id}','${p.title.replace(/'/g,"\\'")}',${dp},'${p.image}',${p.stock})" ${p.stock<=0?'disabled':''}>
                        <i class="fa-solid fa-bag-shopping"></i> ADD TO BAG
                    </button>
                    <button class="btn btn-accent" style="flex:1.3;" onclick="buyNow('${doc.id}','${p.title.replace(/'/g,"\\'")}',${dp},'${p.image}',${p.stock})" ${p.stock<=0?'disabled':''}>
                        <i class="fa-solid fa-bolt"></i> BUY NOW
                    </button>
                </div>
            `;
        });

        function addToCart(id, title, price, image, maxStock) {
            let cart = getLocalCart();
            const ex = cart.find(i => i.id === id);
            const currentQty = ex ? ex.quantity : 0;
            if (currentQty >= maxStock) {
                showToast('<i class="fa-solid fa-triangle-exclamation" style="color:#e67e22;"></i> Max stock reached!');
                return;
            }
            if (ex) ex.quantity += 1;
            else cart.push({ id, title, price, image, quantity: 1 });
            setLocalCart(cart);
            syncCartWithFirestore();
            showToast('<i class="fa-solid fa-check" style="color:var(--accent);"></i> Added to bag!');
        }

        function showToast(msg) {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 2500);
        }

        function buyNow(id, title, price, image, maxStock) {
            addToCart(id, title, price, image, maxStock);
            window.location.href = 'cart.html';
        }
    </script>
</body>
</html>
