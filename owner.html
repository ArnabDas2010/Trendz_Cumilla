<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owner — TRENDZ COMILLA</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <header>
        <div class="header-main">
            <a href="index.html" class="logo">TRENDZ <span>COMILLA</span></a>
            <div class="header-actions" style="margin-left:auto;gap:8px;">
                <span style="font-size:11px;font-weight:700;color:var(--accent);background:rgba(200,169,110,0.12);padding:4px 10px;border-radius:50px;letter-spacing:0.5px;">OWNER</span>
                <button onclick="logout()" class="action-btn" style="color:#c0392b;"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top:20px;">

        <!-- Stats -->
        <div class="stat-grid">
            <div class="stat-card" style="background:var(--primary);">
                <div class="stat-value" id="totalUsers" style="color:var(--accent);">—</div>
                <div class="stat-label" style="color:rgba(255,255,255,0.6);">Users</div>
            </div>
            <div class="stat-card" style="background:var(--primary);">
                <div class="stat-value" id="totalProducts" style="color:#a78bfa;">—</div>
                <div class="stat-label" style="color:rgba(255,255,255,0.6);">Products</div>
            </div>
            <div class="stat-card" style="background:var(--primary);">
                <div class="stat-value" id="totalOrders" style="color:#6ab0de;">—</div>
                <div class="stat-label" style="color:rgba(255,255,255,0.6);">Orders</div>
            </div>
            <div class="stat-card" style="background:var(--primary);">
                <div class="stat-value" id="totalRevenue" style="color:#5cb85c;">৳0</div>
                <div class="stat-label" style="color:rgba(255,255,255,0.6);">Revenue</div>
            </div>
        </div>

        <!-- Announcement -->
        <section>
            <div class="section-header">
                <h2 class="section-title">Announcement</h2>
            </div>
            <div class="form-card">
                <textarea id="annText" placeholder="Message to all customers..." style="height:80px;resize:none;margin-bottom:14px;"></textarea>
                <button class="btn btn-accent" onclick="postAnn()">
                    <i class="fa-solid fa-paper-plane"></i> POST
                </button>
            </div>
        </section>

        <!-- Inventory (same as admin) -->
        <section style="margin-top:28px;">
            <div class="section-header">
                <h2 class="section-title">Inventory</h2>
                <button class="btn btn-accent" style="width:auto;padding:9px 16px;font-size:12px;" onclick="toggleForm()">
                    <i class="fa-solid fa-plus"></i> ADD
                </button>
            </div>

            <div id="productForm" style="display:none;margin-bottom:20px;">
                <div class="form-card">
                    <h4 id="formTitle" style="font-family:var(--font-serif);font-size:17px;font-weight:700;margin-bottom:18px;">New Product</h4>
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="pTitle" required placeholder="e.g. Cotton Salwar Kameez">
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                        <div class="form-group">
                            <label>Price (৳)</label>
                            <input type="number" id="pPrice" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Discount (%)</label>
                            <input type="number" id="pDiscount" value="0" min="0" max="90">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="url" id="pImage" required placeholder="https://...">
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                        <div class="form-group">
                            <label>Category</label>
                            <select id="pCategory">
                                <option>Men</option><option>Women</option><option>Kids</option>
                                <option>Traditional</option><option>Accessories</option><option>Footwear</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Stock</label>
                            <input type="number" id="pStock" required min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="pDesc" style="height:80px;"></textarea>
                    </div>
                    <input type="hidden" id="pId">
                    <div style="display:flex;gap:10px;">
                        <button type="button" class="btn btn-primary" style="flex:2;" onclick="saveProduct()">SAVE</button>
                        <button type="button" class="btn btn-secondary" style="flex:1;" onclick="toggleForm()">CANCEL</button>
                    </div>
                </div>
            </div>

            <div id="ownerProductList">
                <div class="text-center" style="padding:40px 0;"><div class="loading-spinner" style="margin:0 auto;"></div></div>
            </div>
        </section>

        <!-- Orders -->
        <section style="margin-top:28px;">
            <div class="section-header">
                <h2 class="section-title">Orders</h2>
            </div>
            <div id="ownerOrderList">
                <div class="text-center" style="padding:40px 0;"><div class="loading-spinner" style="margin:0 auto;"></div></div>
            </div>
        </section>

        <!-- Users (owner-only) -->
        <section style="margin-top:28px;">
            <div class="section-header">
                <h2 class="section-title">User Management</h2>
            </div>
            <div id="userList">
                <div class="text-center" style="padding:40px 0;"><div class="loading-spinner" style="margin:0 auto;"></div></div>
            </div>
        </section>

        <div class="spacer-80"></div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'login.html'; return; }
            getUserRole(user.uid).then(role => {
                if (role !== 'owner') { window.location.href = 'index.html'; return; }
                loadData();
            });
        });

        function loadData() {
            // Users
            db.collection('users').onSnapshot(snap => {
                document.getElementById('totalUsers').textContent = snap.size;
                renderUsers(snap);
            });
            // Products
            db.collection('products').onSnapshot(snap => {
                document.getElementById('totalProducts').textContent = snap.size;
                renderProducts(snap);
            });
            // Orders
            db.collection('orders').onSnapshot(snap => {
                document.getElementById('totalOrders').textContent = snap.size;
                // Sort newest first in JS
                const docs = [];
                snap.forEach(d => docs.push(d));
                docs.sort((a,b) => ((b.data().createdAt||{}).seconds||0) - ((a.data().createdAt||{}).seconds||0));
                renderOrders({ empty: docs.length === 0, forEach: cb => docs.forEach(cb) });
            });
            // Revenue (Delivered)
            db.collection('orders').where('status','==','Delivered').onSnapshot(snap => {
                let rev = 0;
                snap.forEach(d => rev += d.data().total);
                document.getElementById('totalRevenue').textContent = '৳' + rev.toLocaleString();
            });
        }

        // ── Products ──
        function renderProducts(snap) {
            const list = document.getElementById('ownerProductList');
            if (snap.empty) { list.innerHTML = '<p class="text-center" style="color:var(--text-muted);padding:30px 0;">No products yet.</p>'; return; }
            let html = '';
            snap.forEach(doc => {
                const p = doc.data();
                const dp = p.price - (p.price * (p.discount / 100));
                html += `
                    <div class="admin-row">
                        <img src="${p.image}" style="width:48px;height:48px;object-fit:cover;border-radius:var(--radius-md);background:var(--surface);flex-shrink:0;">
                        <div style="flex:1;min-width:0;">
                            <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.title}</div>
                            <div style="font-size:12px;color:var(--accent);font-weight:700;margin-top:2px;">৳${dp.toFixed(0)} <span style="color:var(--text-muted);font-weight:400;">· Stock: ${p.stock}</span></div>
                        </div>
                        <div style="display:flex;gap:6px;flex-shrink:0;">
                            <button onclick="editProduct('${doc.id}')" class="icon-btn" style="background:var(--surface);color:var(--primary);"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteProduct('${doc.id}')" class="icon-btn" style="background:#fff0f0;color:#c0392b;"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        }

        function toggleForm() {
            const f = document.getElementById('productForm');
            const visible = f.style.display !== 'none';
            f.style.display = visible ? 'none' : 'block';
            if (visible) {
                ['pId','pTitle','pPrice','pDiscount','pImage','pStock','pDesc'].forEach(id => {
                    document.getElementById(id).value = id === 'pDiscount' ? '0' : '';
                });
                document.getElementById('formTitle').textContent = 'New Product';
            }
        }

        function saveProduct() {
            const id  = document.getElementById('pId').value;
            const btn = document.querySelector('#productForm .btn-primary');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> SAVING...';
            btn.disabled = true;

            const data = {
                title:       document.getElementById('pTitle').value.trim(),
                price:       parseFloat(document.getElementById('pPrice').value),
                discount:    parseFloat(document.getElementById('pDiscount').value) || 0,
                image:       document.getElementById('pImage').value.trim(),
                category:    document.getElementById('pCategory').value,
                stock:       parseInt(document.getElementById('pStock').value),
                description: document.getElementById('pDesc').value.trim(),
                updatedAt:   firebase.firestore.FieldValue.serverTimestamp()
            };
            if (!id) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();

            (id ? db.collection('products').doc(id).update(data) : db.collection('products').add(data))
                .then(() => toggleForm())
                .catch(err => {
                    alert('Save failed: ' + err.message);
                    btn.innerHTML = 'SAVE';
                    btn.disabled = false;
                });
        }

        function editProduct(id) {
            db.collection('products').doc(id).get().then(doc => {
                const p = doc.data();
                document.getElementById('pId').value       = doc.id;
                document.getElementById('pTitle').value    = p.title;
                document.getElementById('pPrice').value    = p.price;
                document.getElementById('pDiscount').value = p.discount;
                document.getElementById('pImage').value    = p.image;
                document.getElementById('pCategory').value = p.category;
                document.getElementById('pStock').value    = p.stock;
                document.getElementById('pDesc').value     = p.description || '';
                document.getElementById('formTitle').textContent = 'Edit Product';
                document.getElementById('productForm').style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function deleteProduct(id) {
            if (confirm('Delete this product?')) db.collection('products').doc(id).delete();
        }

        // ── Orders ──
        function renderOrders(snap) {
            const list = document.getElementById('ownerOrderList');
            if (snap.empty) { list.innerHTML = '<p class="text-center" style="color:var(--text-muted);padding:30px 0;">No orders yet.</p>'; return; }
            let html = '';
            snap.forEach(doc => {
                const o = doc.data();
                const statusColor = {Pending:'#e67e22',Confirmed:'#2980b9',Shipped:'#8e44ad',Delivered:'#27ae60',Cancelled:'#c0392b'}[o.status] || 'var(--text-muted)';
                html += `
                    <div class="order-card">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                            <strong style="color:var(--accent);font-size:12px;">#${doc.id.substring(0,8).toUpperCase()}</strong>
                            <span style="font-size:10px;font-weight:700;color:${statusColor};background:${statusColor}18;padding:3px 9px;border-radius:50px;text-transform:uppercase;">${o.status}</span>
                        </div>
                        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${o.userEmail}</div>
                        <div style="background:var(--surface);padding:12px;border-radius:var(--radius-md);margin-bottom:10px;font-size:13px;border:1px solid var(--border);">
                            <div style="margin-bottom:5px;font-weight:700;">৳${o.total} <span style="font-size:11px;font-weight:400;color:var(--text-muted);">via ${(o.paymentMethod||'').toUpperCase()} · ${(o.items||[]).length} item(s)</span></div>
                            <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;"><i class="fa-solid fa-fingerprint"></i> ${o.transactionId}</div>
                            <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;"><i class="fa-solid fa-phone"></i> ${o.senderNumber}</div>
                            <div style="font-size:12px;color:var(--text-muted);white-space:pre-wrap;word-break:break-word;"><i class="fa-solid fa-location-dot"></i> ${o.address||'—'}</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);flex-shrink:0;">Status:</span>
                            <select onchange="updateOrderStatus('${doc.id}',this.value)" style="flex:1;padding:8px 10px;border-radius:var(--radius-md);border:1.5px solid var(--border);font-size:12px;font-weight:600;background:var(--white);font-family:var(--font-sans);outline:none;">
                                <option ${o.status==='Pending'?'selected':''}>Pending</option>
                                <option ${o.status==='Confirmed'?'selected':''}>Confirmed</option>
                                <option ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                <option ${o.status==='Delivered'?'selected':''}>Delivered</option>
                                <option ${o.status==='Cancelled'?'selected':''}>Cancelled</option>
                            </select>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        }

        function updateOrderStatus(id, status) {
            db.collection('orders').doc(id).update({ status });
        }

        // ── Users (Owner-only section) ──
        function renderUsers(snap) {
            const list = document.getElementById('userList');
            const roleStyle = {
                owner: { color: '#fff', bg: '#1a1a2e', label: '👑 Owner' },
                admin: { color: 'var(--accent)', bg: 'rgba(200,169,110,0.15)', label: '🛡 Admin' },
                user:  { color: 'var(--text-muted)', bg: 'var(--surface)', label: '👤 User' }
            };
            let html = '';
            snap.forEach(doc => {
                const u = doc.data();
                const banned = u.status === 'banned';
                const rs = roleStyle[u.role] || roleStyle.user;
                const isOwnerRow = u.role === 'owner';
                html += `
                    <div class="order-card" style="${isOwnerRow ? 'border:1.5px solid rgba(26,26,46,0.18);' : ''}">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${isOwnerRow ? 0 : 14}px;">
                            <div style="min-width:0;flex:1;">
                                <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${u.name || 'Anonymous'}</div>
                                <div style="font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${u.email || '—'}</div>
                                ${banned ? '<div style="font-size:10px;color:#c0392b;font-weight:700;margin-top:4px;"><i class="fa-solid fa-ban"></i> BANNED</div>' : ''}
                            </div>
                            <span style="flex-shrink:0;font-size:10px;font-weight:700;background:${rs.bg};color:${rs.color};padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:0.5px;margin-left:8px;border:${isOwnerRow?'1px solid rgba(26,26,46,0.25)':'none'};">${rs.label}</span>
                        </div>
                        ${!isOwnerRow ? `
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                            <button class="btn btn-secondary" style="font-size:11px;padding:10px;" onclick="updateRole('${doc.id}','${u.role==='admin'?'user':'admin'}')">
                                <i class="fa-solid fa-user-shield"></i> ${u.role==='admin'?'DEMOTE':'MAKE ADMIN'}
                            </button>
                            <button class="btn" style="font-size:11px;padding:10px;background:${banned?'#edfaf0':'#fff0f0'};color:${banned?'#1a6b35':'#c0392b'};border:1px solid ${banned?'#a3dfb4':'#ffd7d7'};" onclick="toggleBan('${doc.id}','${u.status}')">
                                <i class="fa-solid ${banned?'fa-user-check':'fa-user-slash'}"></i> ${banned?'UNBAN':'BAN'}
                            </button>
                        </div>` : ''}
                    </div>`;
            });
            list.innerHTML = html || '<p class="text-center" style="color:var(--text-muted);padding:30px 0;">No users yet.</p>';
        }

        function updateRole(id, role) { db.collection('users').doc(id).update({ role }); }
        function toggleBan(id, curr) { db.collection('users').doc(id).update({ status: curr === 'banned' ? 'active' : 'banned' }); }

        // ── Announcement ──
        function postAnn() {
            const text = document.getElementById('annText').value.trim();
            if (!text) return;
            db.collection('announcements').add({ text, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
                .then(() => { document.getElementById('annText').value = ''; alert('Announcement posted!'); });
        }
    </script>
</body>
</html>
